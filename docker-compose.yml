services:
  hardhat:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - .:/app
    command: npx hardhat node --hostname 0.0.0.0
    ports:
      - "8545:8545"

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zkrollup
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/zkrollup
      - RPC_URL=http://hardhat:8545
      - API_PORT=4000
    env_file:
      - .env
    volumes:
      - ./deployments:/deployments
    depends_on:
      postgres:
        condition: service_healthy
      hardhat:
        condition: service_started

  flutter:
    build: ./flutter_app
    ports:
      - "8081:80"
    depends_on:
      - backend