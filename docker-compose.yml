services:
  hardhat:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - .:/app
    command: npx hardhat node
    ports:
      - "8545:8545"

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zkrollup
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  deployer:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - .:/app
    depends_on:
      - hardhat
    # We added 'npm install' here to ensure the Linux dependencies are perfectly intact
    command: sh -c "npm install && sleep 5 && npx hardhat run scripts/deploy.js --network localhost"

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/zkrollup
      - RPC_URL=http://hardhat:8545
      - API_PORT=4000
    env_file:
      - .env
    volumes:
      - ./deployments:/deployments
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4000/state"]
      interval: 10s
      timeout: 5s
      retries: 3

  flutter:
    build: ./flutter_app
    ports:
      - "8080:80" # Maps local port 8080 to container's port 80 (nginx)
    depends_on:
      backend:
        condition: service_healthy
